<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 11 Simulator</title>
  <style>
    /* Global Styles */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Desktop Background */
    #desktop {
      background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/1f/Windows_11_Insider_Preview_background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100%;
      padding: 10px;
      position: relative;
    }

    /* Taskbar */
    #taskbar {
      background-color: rgba(30, 30, 30, 0.8);
      height: 60px;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 999;
    }

    /* Taskbar Start Button */
    #startButton {
      background-color: #3e3e42;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      transition: all 0.2s;
    }

    #startButton:hover {
      background-color: #5e5e5e;
    }

    /* Taskbar Icons */
    #taskbarIcons {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .taskbar-icon {
      margin-left: 10px;
      padding: 10px;
      background-color: #3e3e42;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .taskbar-icon:hover {
      background-color: #5f5f5f;
    }

    /* Start Menu */
    #startMenu {
      background-color: #1a1a1a;
      position: absolute;
      top: 70px;
      left: 10px;
      width: 230px;
      padding: 15px;
      color: white;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    #startMenu.hidden {
      display: none;
    }

    #startMenu button {
      background: none;
      border: none;
      color: white;
      text-align: left;
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    #startMenu button:hover {
      background-color: #2b2b2b;
    }

    /* Desktop Icons */
    #desktopIcons {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      position: absolute;
      top: 100px;
      left: 20px;
      z-index: 2;
    }

    .desktop-icon {
      text-align: center;
      cursor: pointer;
      color: white;
      font-size: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .desktop-icon img {
      width: 50px;
      height: 50px;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .desktop-icon:hover img {
      opacity: 1;
    }

    /* Windows (draggable, resizable) */
    .window {
      width: 500px;
      height: 350px;
      background-color: #fff;
      border-radius: 10px;
      position: absolute;
      top: 100px;
      left: 100px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
      z-index: 10;
      transition: all 0.3s ease;
    }

    .window-header {
      background-color: #3e3e42;
      color: white;
      padding: 12px 15px;
      cursor: grab;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .window-content {
      padding: 20px;
      overflow-y: auto;
      height: calc(100% - 60px); /* Make space for header */
    }

    .window-controls button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 5px;
      font-size: 16px;
    }

    .window-controls button:hover {
      color: #bbb;
    }

    /* Resize handle */
    .resize-handle {
      background-color: #3e3e42;
      width: 16px;
      height: 16px;
      position: absolute;
      right: 0;
      bottom: 0;
      cursor: nwse-resize;
    }

    /* Notepad text area */
    #notepadContent {
      width: 100%;
      height: 100%;
      background-color: #f4f4f4;
      border: 1px solid #ddd;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 14px;
      resize: none;
      border-radius: 5px;
    }

  </style>
</head>
<body>

  <!-- Desktop Background -->
  <div id="desktop">
    
    <!-- Desktop Icons -->
    <div id="desktopIcons">
      <div class="desktop-icon" onclick="openApp('Notepad')">
        <img src="https://img.icons8.com/ios/452/notepad.png" alt="Notepad Icon"/>
        <span>Notepad</span>
      </div>
      <div class="desktop-icon" onclick="openApp('Calculator')">
        <img src="https://img.icons8.com/ios/452/calculator.png" alt="Calculator Icon"/>
        <span>Calculator</span>
      </div>
      <div class="desktop-icon" onclick="openApp('Settings')">
        <img src="https://img.icons8.com/ios/452/settings.png" alt="Settings Icon"/>
        <span>Settings</span>
      </div>
    </div>

  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="startButton" onclick="toggleStartMenu()">Start</button>
    <div id="taskbarIcons"></div>
  </div>

  <!-- Start Menu -->
  <div id="startMenu" class="hidden">
    <button onclick="openApp('Notepad')">Notepad</button>
    <button onclick="openApp('Calculator')">Calculator</button>
    <button onclick="openApp('Settings')">Settings</button>
  </div>

  <!-- Window Container -->
  <div id="windowContainer"></div>

  <script>
    let windows = [];
    let minimizedWindows = [];

    // Toggle Start Menu visibility
    function toggleStartMenu() {
      const startMenu = document.getElementById('startMenu');
      startMenu.classList.toggle('hidden');
    }

    // Open an app (create a new window)
    function openApp(appName) {
      createWindow(appName);
      toggleStartMenu();
    }

    // Create a new window
    function createWindow(appName) {
      const windowContainer = document.getElementById('windowContainer');
      const window = document.createElement('div');
      window.classList.add('window');
      window.setAttribute('id', appName + 'Window');

      // Window header (draggable)
      const windowHeader = document.createElement('div');
      windowHeader.classList.add('window-header');
      windowHeader.innerText = appName;

      // Window Controls (Minimize, Close)
      const controls = document.createElement('div');
      controls.classList.add('window-controls');
      const minimizeButton = document.createElement('button');
      minimizeButton.innerText = '_';
      minimizeButton.onclick = () => minimizeWindow(window);
      const closeButton = document.createElement('button');
      closeButton.innerText = 'X';
      closeButton.onclick = () => closeWindow(window);
      controls.appendChild(minimizeButton);
      controls.appendChild(closeButton);
      windowHeader.appendChild(controls);

      // Window content based on app type
      const windowContent = document.createElement('div');
      windowContent.classList.add('window-content');

      if (appName === 'Notepad') {
        const textarea = document.createElement('textarea');
        textarea.id = 'notepadContent';
        textarea.placeholder = 'Type here...';
        windowContent.appendChild(textarea);
      } else if (appName === 'Calculator') {
        windowContent.innerHTML = `
          <h3>Calculator</h3>
          <div>
            <button onclick="alert('1')">1</button>
            <button onclick="alert('2')">2</button>
            <button onclick="alert('3')">3</button>
          </div>
          <div>
            <button onclick="alert('4')">4</button>
            <button onclick="alert('5')">5</button>
            <button onclick="alert('6')">6</button>
          </div>
        `;
      } else if (appName === 'Settings') {
        windowContent.innerHTML = `
          <h3>Settings</h3>
          <p>Change theme:</p>
          <select>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        `;
      }

      window.appendChild(windowHeader);
      window.appendChild(windowContent);

      // Append window to container
      windowContainer.appendChild(window);

      // Make the window draggable
      makeWindowDraggable(window);
      makeWindowResizable(window);

      // Add window icon to taskbar
      addToTaskbar(appName, window);
    }

    // Add app icon to taskbar
    function addToTaskbar(appName, window) {
      const taskbarIcons = document.getElementById('taskbarIcons');
      const icon = document.createElement('div');
      icon.classList.add('taskbar-icon');
      icon.innerText = appName[0];
      icon.onclick = function () {
        bringWindowToFront(window);
      };
      taskbarIcons.appendChild(icon);
    }

    // Bring window to front (raise z-index)
    function bringWindowToFront(window) {
      window.style.zIndex = windows.length + 10;
    }

    // Make window draggable
    function makeWindowDraggable(window) {
      const header = window.querySelector('.window-header');
      let isDragging = false;
      let offsetX, offsetY;

      header.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - window.offsetLeft;
        offsetY = e.clientY - window.offsetTop;
        window.style.cursor = 'grabbing';
      });

      document.addEventListener('mousemove', (e) => {
        if (isDragging) {
          window.style.left = `${e.clientX - offsetX}px`;
          window.style.top = `${e.clientY - offsetY}px`;
        }
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
        window.style.cursor = 'grab';
      });
    }

    // Minimize window (hide it)
    function minimizeWindow(window) {
      window.style.display = 'none';
      const taskbarIcons = document.getElementById('taskbarIcons');
      taskbarIcons.querySelectorAll('.taskbar-icon').forEach(icon => {
        if (icon.innerText === window.querySelector('.window-header').innerText[0]) {
          icon.style.backgroundColor = '#888';
          icon.onclick = function () {
            restoreWindow(window);
          };
        }
      });
    }

    // Restore window from taskbar
    function restoreWindow(window) {
      window.style.display = 'block';
      window.style.zIndex = windows.length + 10;
    }

    // Close window
    function closeWindow(window) {
      window.remove();
      const taskbarIcons = document.getElementById('taskbarIcons');
      taskbarIcons.querySelectorAll('.taskbar-icon').forEach(icon => {
        if (icon.innerText === window.querySelector('.window-header').innerText[0]) {
          icon.remove();
        }
      });
    }

    // Make window resizable
    function makeWindowResizable(window) {
      const resizeHandle = document.createElement('div');
      resizeHandle.classList.add('resize-handle');
      window.appendChild(resizeHandle);

      let isResizing = false;
      let startWidth, startHeight, startX, startY;

      resizeHandle.addEventListener('mousedown', (e) => {
        isResizing = true;
        startWidth = window.offsetWidth;
        startHeight = window.offsetHeight;
        startX = e.clientX;
        startY = e.clientY;
      });

      document.addEventListener('mousemove', (e) => {
        if (isResizing) {
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          window.style.width = `${startWidth + dx}px`;
          window.style.height = `${startHeight + dy}px`;
        }
      });

      document.addEventListener('mouseup', () => {
        isResizing = false;
      });
    }
  </script>

</body>
</html>
