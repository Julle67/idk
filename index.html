<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crash</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: white;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }

    .screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      color: white;
      background: #0078d7;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 60px;
      box-sizing: border-box;
      font-size: 22px;
      line-height: 1.6;
    }

    .sad {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .small {
      font-size: 16px;
      margin-top: 20px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<button onclick="startCrash()">Crash button</button>

<script>
  function startCrash() {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    let percent = 0;

    document.body.innerHTML = `
      <div class="screen">
        <div class="sad">:(</div>
        <div>Your PC ran into a problem and needs to restart.</div>
        <div>We're just collecting some error info, and then we'll restart for you.</div>
        <div id="progress">0% complete</div>
        <div class="small">For more information about this issue and possible fixes, visit a support page.</div>
      </div>
    `;

    let interval = setInterval(() => {
      percent++;
      document.getElementById("progress").innerText = percent + "% complete";

      if (percent >= 100) {
        clearInterval(interval);

        setTimeout(() => {
          document.body.innerHTML = `<div style="background:black;width:100vw;height:100vh;"></div>`;
        }, 800);
      }
    }, 50);
  }
</script>

</body>
</html>
