<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fake Crash</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }

    .blue-screen, .black-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      z-index: 9999;
    }

    .blue-screen {
      background: #0000aa;
      font-size: 20px;
    }

    .black-screen {
      background: black;
    }
  </style>
</head>
<body>

<button onclick="startCrash()">Click me</button>

<script>
  function startCrash() {
    // Request fullscreen (may require user interaction)
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen();
    }

    // Show blue screen
    document.body.innerHTML = `
      <div class="blue-screen">
        :(<br><br>
        Your PC ran into a problem and needs to restart.<br>
        We're just collecting some error info...
      </div>
    `;

    // After 3 seconds, turn black
    setTimeout(() => {
      document.body.innerHTML = `
        <div class="black-screen"></div>
      `;
    }, 3000);
  }
</script>

</body>
</html>
