<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Centered Button</title>
  <style>
    body {
      display: flex;
      justify-content: center; /* center horizontally */
      align-items: center;     /* center vertically */
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button onclick="sayHej()">Click me</button>

<script>
  function sayHej() {
    alert("hej");
  }
</script>

</body>
</html>
