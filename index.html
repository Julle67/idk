<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 11 Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    #taskbar {
      background-color: #2d2d30;
      height: 40px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      color: white;
      position: fixed;
      bottom: 0;
      width: 100%;
      z-index: 10;
    }

    #startButton {
      background-color: #3e3e42;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 12px;
    }

    #taskbarIcons {
      display: flex;
      margin-left: 20px;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      background-color: #3e3e42;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #575757;
    }

    #startMenu {
      background-color: #1a1a1a;
      position: absolute;
      top: 45px;
      left: 10px;
      width: 200px;
      padding: 10px;
      color: white;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      z-index: 20;
    }

    #startMenu.hidden {
      display: none;
    }

    .window {
      width: 400px;
      height: 300px;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 5px;
      position: absolute;
      top: 100px;
      left: 100px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      z-index: 5;
    }

    .window .header {
      background-color: #3e3e42;
      color: white;
      padding: 10px;
      cursor: move;
      user-select: none;
      border-top-left-radius: 5px;
      border-top-right-radius: 5px;
    }

    .window .content {
      padding: 15px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="startButton" onclick="toggleStartMenu()">Start</button>
    <div id="taskbarIcons"></div>
  </div>

  <!-- Start Menu -->
  <div id="startMenu" class="hidden">
    <button onclick="openApp('Notepad')">Notepad</button>
    <button onclick="openApp('Calculator')">Calculator</button>
    <button onclick="openApp('Settings')">Settings</button>
  </div>

  <!-- Container for windows -->
  <div id="windowContainer"></div>

  <script>
    let windows = [];
    let minimizedWindows = [];

    // Toggle Start Menu
    function toggleStartMenu() {
      const startMenu = document.getElementById('startMenu');
      startMenu.classList.toggle('hidden');
    }

    // Open an app
    function openApp(appName) {
      createWindow(appName);
      toggleStartMenu();
    }

    // Create a new window
    function createWindow(appName) {
      const windowContainer = document.getElementById('windowContainer');
      
      // Create window
      const window = document.createElement('div');
      window.classList.add('window');
      window.setAttribute('id', appName + 'Window');
      
      // Header (moveable area)
      const header = document.createElement('div');
      header.classList.add('header');
      header.innerText = appName;
      window.appendChild(header);

      // Content area
      const content = document.createElement('div');
      content.classList.add('content');
      content.innerHTML = `<h3>${appName} App</h3><p>This is a simple ${appName} window.</p>`;
      window.appendChild(content);

      // Add window to the container
      windowContainer.appendChild(window);
      
      // Add to taskbar
      addToTaskbar(appName, window);

      // Make window draggable
      makeWindowDraggable(window);

      windows.push(window);
    }

    // Add app icon to taskbar
    function addToTaskbar(appName, window) {
      const taskbarIcons = document.getElementById('taskbarIcons');
      
      const icon = document.createElement('button');
      icon.innerText = appName;
      icon.onclick = function() {
        bringWindowToFront(window);
      };
      taskbarIcons.appendChild(icon);
    }

    // Bring window to front
    function bringWindowToFront(window) {
      window.style.zIndex = windows.length + 1;
    }

    // Make window draggable
    function makeWindowDraggable(window) {
      const header = window.querySelector('.header');
      let isDragging = false;
      let offsetX, offsetY;

      header.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - window.offsetLeft;
        offsetY = e.clientY - window.offsetTop;
      });

      document.addEventListener('mousemove', (e) => {
        if (isDragging) {
          window.style.left = `${e.clientX - offsetX}px`;
          window.style.top = `${e.clientY - offsetY}px`;
        }
      });

      document.addEventListener('mouseup', () => {
        isDragging = false;
      });
    }

    // Minimize window
    function minimizeWindow(window) {
      const taskbarIcons = document.getElementById('taskbarIcons');
      const icon = document.createElement('button');
      icon.innerText = window.querySelector('.header').innerText;
      icon.onclick = function() {
        restoreWindow(window);
      };
      taskbarIcons.appendChild(icon);
      window.style.display = 'none';
      minimizedWindows.push(window);
    }

    // Restore window from taskbar
    function restoreWindow(window) {
      window.style.display = 'block';
      minimizedWindows = minimizedWindows.filter(w => w !== window);
    }

    // Close window
    function closeWindow(window) {
      window.remove();
      const taskbarIcons = document.getElementById('taskbarIcons');
      taskbarIcons.querySelectorAll('button').forEach(icon => {
        if (icon.innerText === window.querySelector('.header').innerText) {
          icon.remove();
        }
      });
    }

    // Add close and minimize buttons to window
    function addWindowControls(window) {
      const closeButton = document.createElement('button');
      closeButton.innerText = 'X';
      closeButton.onclick = () => closeWindow(window);
      window.querySelector('.header').appendChild(closeButton);

      const minimizeButton = document.createElement('button');
      minimizeButton.innerText = '_';
      minimizeButton.onclick = () => minimizeWindow(window);
      window.querySelector('.header').appendChild(minimizeButton);
    }
  </script>

</body>
</html>
